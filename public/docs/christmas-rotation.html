<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Christmas Rotation</title>
  <link rel="stylesheet" href="/css/joshhub-header.css">
  <script src="/js/joshhub-header.js" defer></script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f5f7fb; color: #1f2835; }
    main { max-width: 900px; margin: 72px auto; padding: 0 20px; }
    .card { background: #fff; border: 1px solid #d5deea; border-radius: 14px; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #d5deea; padding: 8px; text-align: left; }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <h1>Pfeiffer/Parris Christmas Rotation</h1>
      <p>Quick local reference page for planning hosts by year.</p>
      <table>
        <thead>
          <tr><th>Year</th><th>Host Family</th></tr>
        </thead>
        <tbody>
          <tr><td>2025</td><td>Parris</td></tr>
          <tr><td>2026</td><td>Pfeiffer</td></tr>
          <tr><td>2027</td><td>Parris</td></tr>
          <tr><td>2028</td><td>Pfeiffer</td></tr>
        </tbody>
      </table>
      <p><a href="/apps">Back to Apps</a></p>
    </div>
  </main>
</body>
</html>
