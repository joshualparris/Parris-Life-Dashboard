<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Classic D&D 5e Text Adventure</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="/css/joshhub-header.css">
  <script src="/js/joshhub-header.js" defer></script>
</head>
<body>
  <div id="game-container">
    <header id="hud">
      <div id="character-summary">
        <button id="open-creator">Open Character Creator</button>
        <div id="char-brief">
          <strong id="char-name">Adventurer</strong>
          <div id="char-details">HP: <span id="brief-hp">10</span> | AC: <span id="brief-ac">13</span> | Gold: <span id="brief-gold">0</span></div>
        </div>
      </div>
      <div style="margin-left:12px;color:#9aa3b5;">Welcome — Use arrow keys or the minimap. <button onclick="location.href='/games'" style="margin-left:12px;padding:6px 8px;border-radius:8px;">Back to Games</button></div>
    </header>

    <section style="margin:12px 16px;padding:12px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:rgba(12,16,32,0.7);color:#cbd5e1;">
      <strong>Classic D&amp;D Text Adventure</strong>
      <div style="margin-top:6px;font-size:13px;color:#9aa3b5;">
        Create a hero, explore rooms, and choose actions below. Use the minimap to move and track your position.
      </div>
    </section>

    <section id="main-play">
      <div id="story"></div>
      <div id="choices"></div>
      <div id="dice"></div>
    </section>

    <!-- Character creator modal/section (hidden by default) -->
    <aside id="character-creator" class="hidden">
      <h2>Character Creator (D&D 5e)</h2>
      <label>Name: <input id="cc-name" type="text" placeholder="Character name"></label>
      <label>Race:
        <select id="cc-race">
          <option>Human</option>
          <option>Elf</option>
          <option>Dwarf</option>
          <option>Halfling</option>
        </select>
      </label>
      <label>Class:
        <select id="cc-class">
          <option>Fighter</option>
          <option>Rogue</option>
          <option>Wizard</option>
          <option>Cleric</option>
        </select>
      </label>
      <label>Background: <input id="cc-background" type="text" placeholder="Background"></label>
      <label>Alignment:
        <select id="cc-alignment">
          <option>Neutral</option>
          <option>Lawful Good</option>
          <option>Chaotic Good</option>
          <option>Lawful Evil</option>
        </select>
      </label>

      <h3>Ability Scores</h3>
      <div id="score-methods">
        <label><input type="radio" name="method" value="standard" checked> Standard Array</label>
        <label><input type="radio" name="method" value="roll"> Roll 4d6 (drop lowest)</label>
        <label><input type="radio" name="method" value="pointbuy"> Point Buy (27)</label>
      </div>
      <div id="ability-scores"></div>

      <div class="cc-actions">
        <button id="cc-apply">Apply & Close</button>
        <button id="cc-randomize">Randomize (roll)</button>
        <button id="cc-reset">Reset</button>
      </div>
    </aside>
  </div>

  <!-- Persistent minimap bottom-right -->
  <div id="minimap">
    <canvas id="map-canvas" width="200" height="200"></canvas>
    <div id="map-controls">
      <button data-dir="north">▲</button>
      <div>
        <button data-dir="west">◀</button>
        <button data-dir="east">▶</button>
      </div>
      <button data-dir="south">▼</button>
    </div>
    <div id="map-coords">(0,0)</div>
  </div>
  <script src="game.js"></script>
  <script>
    if(window.JoshHubHeader && window.JoshHubHeader.ensure) window.JoshHubHeader.ensure();
    // ensure minimap shows at least a placeholder
    const mapCanvas = document.getElementById('map-canvas');
    if(mapCanvas && mapCanvas.getContext){
      const ctx = mapCanvas.getContext('2d');
      ctx.fillStyle = '#0b1220'; ctx.fillRect(0,0,mapCanvas.width,mapCanvas.height);
      ctx.fillStyle = '#9aa3b5'; ctx.fillRect(90,90,20,20); // player marker
    }
  </script>
</body>
</html>
